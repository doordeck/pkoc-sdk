syntax = "proto3";
package com.sentryinteractive.opencredential.verification.v1alpha;
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "types.proto";
option java_multiple_files = true;
option java_package = "com.sentryinteractive.opencredential.api.verification";
option java_outer_classname = "VerificationProtoV1Alpha";

service VerificationService {
  rpc StartEmailVerification(StartEmailVerificationRequest) returns (StartEmailVerificationResponse);
  rpc CompleteEmailVerification(CompleteEmailVerificationRequest) returns (google.protobuf.Empty);
}

message StartEmailVerificationRequest {
  string email = 1;
  bytes credential = 2;
  com.sentryinteractive.opencredential.common.v1alpha.CredentialType credential_type = 3;
  string attestation_document = 4;
}

message StartEmailVerificationResponse {
  string verification_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message CompleteEmailVerificationRequest {
  string token = 1;
  string code = 2;
}
