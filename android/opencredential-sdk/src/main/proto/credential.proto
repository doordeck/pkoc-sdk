syntax = "proto3";

package com.sentryinteractive.opencredential.credential.v1alpha;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "types.proto";

option java_multiple_files = true;
option java_package = "com.sentryinteractive.opencredential.api.credential";
option java_outer_classname = "CredentialProtoV1Alpha";

service CredentialService {
  rpc GetCredentials(GetCredentialsRequest) returns (GetCredentialsResponse);
  rpc DeleteCredentials(DeleteCredentialsRequest) returns (google.protobuf.Empty);
  rpc VerifyCredential(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message GetCredentialsRequest {
  CredentialFilter filter = 1;
}

enum CredentialFilter {
  CREDENTIAL_FILTER_UNSPECIFIED = 0; // Allow backend to determine the best filter to apply based on the request context
  CREDENTIAL_FILTER_SAME_IDENTITY = 1; // Returns all credentials associated with the given identity
  CREDENTIAL_FILTER_SAME_KEY = 2; // Returns credentials that are associated with the authentication key used in the request
}

/*
 * Deletes credentials belonging to the authenticated user. Both fields act as optional AND filters over the full set of
 * credentials reachable from the current authentication context:
 *
 * - (none)            – delete every credential across all identities (GDPR full erasure)
 * - identity          – delete all keys for a single identity (e.g. remove an email address)
 * - key_thumbprint    – delete a specific key across all identities (e.g. lost device)
 * - both              – delete exactly one credential/identity combination
 *
 * Any approved organization shares are automatically revoked before deletion.
 */
message DeleteCredentialsRequest {
  /*
   * Restrict deletion to credentials matching this identity. When absent, all identities associated with the
   * authenticated user are in scope.
   */
  optional com.sentryinteractive.opencredential.common.v1alpha.Identity identity = 1;

  /*
   * Restrict deletion to the credential with this key thumbprint (base64url SHA-256 of the SubjectPublicKeyInfo DER).
   * When absent, all keys for the matching identities are in scope.
   */
  optional string key_thumbprint = 2;
}

message GetCredentialsResponse {
  repeated Credential credentials = 1;
}

message Credential {
  com.sentryinteractive.opencredential.common.v1alpha.Identity identity = 1;
  bytes credential = 2;
  com.sentryinteractive.opencredential.common.v1alpha.CredentialType credential_type = 3;
  google.protobuf.Timestamp created_at = 4;
  bool attested = 5;
  google.protobuf.Timestamp last_seen_at = 6;
}