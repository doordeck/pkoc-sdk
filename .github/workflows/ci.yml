name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-disabled: true

      - name: Build Android SDK & Sample App
        working-directory: android
        run: ./gradlew :opencredential-sdk:assembleRelease :sample-app:assembleDebug

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build iOS SDK
        run: xcodebuild -scheme OpenCredentialSDK -destination 'generic/platform=iOS' build
