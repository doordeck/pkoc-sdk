name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build Android SDK & Sample App
        working-directory: android
        run: ./gradlew :opencredential-sdk:assembleRelease :sample-app:assembleDebug

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build iOS SDK
        run: xcodebuild -scheme OpenCredentialSDK -destination 'generic/platform=iOS' build
