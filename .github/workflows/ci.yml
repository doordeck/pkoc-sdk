name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true

      - name: Build Android SDK & Sample App
        working-directory: android
        run: ./gradlew :opencredential-sdk:assembleRelease :sample-app:assembleDebug

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build iOS SDK
        run: xcodebuild -scheme OpenCredentialSDK -destination 'generic/platform=iOS' build
