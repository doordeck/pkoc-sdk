name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set version
        id: version
        run: echo "version=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build Android SDK
        working-directory: android
        run: ./gradlew :opencredential-sdk:assembleRelease

      - name: Publish to GitHub Packages
        working-directory: android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.version }}
        run: ./gradlew :opencredential-sdk:publishReleasePublicationToGitHubPackagesRepository

      - name: Create GitHub Release (triggers SPM availability)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "v$VERSION" \
            --generate-notes
